{% load static %}
<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8"/>
        <link rel="stylesheet" href="{% static 'CSS/WebStyle.css' %}">
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Silkscreen:wght@400;700&display=swap">
        <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap">
        <link rel="stylesheet" href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css">
        <title>Conact Us</title>
    </head>

    <body>
        <div>
            <nav class="navbar">
                <ul>
                    <img class="icon" src="{% static 'Images/Icon.png' %}" alt="image not found" width="35px">
                    <b>TASKTRAX</b>
                    <li><a href="{% url 'Welcome' %}">Home</a></li>
                    <li><a href="{% url 'ContactUs' %}">Contact Us</a></li>
                    <li><a href="{% url 'AboutUs' %}">About Us</a></li>
                    <li><a href="{% url 'WhyTASKTRAX' %}">Why TASKTRAX</a></li>
                </ul>
            </nav>
        </div>

        <div class="acformbody">
            <div class="acformwrapper">
                <form action="" method="POST">
                    <h1>Contact Us</h1>

                    <div class="acinputbox1">
                        <input type="text" required placeholder="Your name" name="name" id="name">
                        <i class="bx bxs-user" style="right: 320px;"></i>
                        <input type="tel" required placeholder="Phone number" name="number" id="phoneNumber">
                        <i class="bx bxs-phone"></i>
                    </div>

                    <div class="acinputbox2">
                        <input type="email" required placeholder="Email" name="email" id="email">
                        <i class="bx bxs-envelope"></i>
                    </div>

                    <div class="acinputbox2">
                        <input type="text" required placeholder="Subject" name="subject" id="subject">
                        <i class="bx bxs-message-detail"></i>
                    </div>

                    <div class="actextarea">
                        <textarea name="message" required placeholder="Write your message" id="message"></textarea>
                    </div>

                    <div class="acbtn">
                        <button type="reset">Reset</button>
                        <button type="submit">Submit</button>
                    </div>
                </form>
            </div>
        </div>
        <script src="{% static 'JS/Index.js' %}"></script>
    </body>
</html>
